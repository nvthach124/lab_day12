services:
  # ──────────────────────────────────────
  # Web Service — AI Agent (Sử dụng Docker để ổn định nhất)
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: docker
    region: singapore
    plan: free
    dockerContext: .
    dockerfilePath: 02-docker/production/Dockerfile
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      # Kết nối nội bộ tới con Redis ở dưới
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent-cache
          property: connectionString

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
